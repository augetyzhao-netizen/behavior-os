<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>行为操作系统</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#F7FAFD" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="行为OS" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#F7FAFD;
    --surface:#FFFFFF;
    --surface-2:#EEF4FA;
    --text:#2B3A4A;
    --text-muted:#8198AC;
    --accent:#4F8FE0;
    --accent-soft:#BBD6F2;
    --alert:#E2868B;
    --alert-bg:#FCEEEF;
    --mint:#7FB99C;
    --border:#DCE6F0;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
    min-height:100vh;
    padding-bottom:78px;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Quicksand',sans-serif;}

  /* ---------- 开屏寄语页 ---------- */
  #splash{
    position:fixed; inset:0; z-index:100;
    background:linear-gradient(160deg, #FFFFFF 0%, #EAF2FB 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 32px;
    text-align:center;
    transition:opacity .6s ease, visibility .6s ease;
  }
  #splash.hide{opacity:0; visibility:hidden; pointer-events:none;}
  .splash-aura{
    width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFFFFF, var(--accent-soft) 60%, var(--accent) 100%);
    box-shadow:0 0 30px 6px rgba(79,143,224,0.25);
    margin-bottom:28px;
    animation:breathe 4s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.12);}
  }
  #splashQuote{
    font-family:'Quicksand',sans-serif;
    font-weight:600;
    font-size:19px;
    line-height:1.7;
    color:var(--text);
    max-width:320px;
  }
  #splashHint{
    margin-top:34px;
    font-size:12.5px;
    color:var(--text-muted);
  }

  /* ---------- 状态栏 ---------- */
  .statusbar{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; gap:12px;
    padding:16px 18px 14px;
    background:linear-gradient(to bottom, var(--bg) 75%, transparent);
  }
  .aura-dot{
    width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFFFFF, var(--accent-soft) 65%, var(--accent) 100%);
    flex-shrink:0;
    box-shadow:0 0 14px 2px rgba(79,143,224,0.18);
    transition:box-shadow .6s;
    animation:pulse 3.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.06);}
  }
  .statusbar .label{font-size:12px;color:var(--text-muted);letter-spacing:.02em;}
  .statusbar .value{font-family:'Quicksand',sans-serif;font-size:19px;font-weight:700;}
  .statusbar .time{margin-left:auto;font-size:13px;color:var(--text-muted);}

  /* ---------- 横幅 ---------- */
  .banner{
    margin:0 16px 14px;
    padding:13px 14px;
    border-radius:var(--radius);
    font-size:13.5px;
    line-height:1.55;
    display:none;
  }
  .banner.show{display:block;}
  .banner.ios{background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);}
  .banner.reminder{background:var(--surface-2);border:1px solid var(--accent-soft);color:var(--text);}
  .banner.hook{background:var(--alert-bg);border:1px solid var(--alert);color:var(--text);}
  .banner strong{color:var(--accent);}
  .banner.hook strong{color:#C96269;}
  .banner .close{float:right;color:var(--text-muted);cursor:pointer;font-size:16px;line-height:1;}

  main{padding:0 16px 24px;}
  .view{display:none;}
  .view.active{display:block;}

  h2.section-title{
    font-family:'Quicksand',sans-serif;
    font-size:14.5px;
    font-weight:700;
    color:var(--text-muted);
    letter-spacing:.03em;
    margin:22px 0 10px;
  }
  h2.section-title:first-child{margin-top:4px;}

  textarea{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:14px;
    resize:none;
    min-height:88px;
    box-shadow:0 1px 3px rgba(43,58,74,0.04);
  }
  textarea:focus{outline:none;border-color:var(--accent);}

  .scene-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .scene-chip{
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-muted);
    font-size:13.5px;
    cursor:pointer;
    user-select:none;
  }
  .scene-chip.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
    font-weight:600;
  }

  .energy-row{margin-top:18px;}
  .energy-row .row-label{display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:8px;}
  .energy-row .row-label span.val{font-family:'JetBrains Mono',monospace;color:var(--accent);}
  input[type=range]{
    width:100%;
    -webkit-appearance:none;
    height:4px;
    border-radius:2px;
    background:var(--border);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:20px;height:20px;border-radius:50%;
    background:var(--accent);
    border:3px solid var(--bg);
    box-shadow:0 1px 4px rgba(43,58,74,0.2);
  }

  .btn{
    margin-top:18px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:var(--radius);
    background:var(--accent);
    color:#fff;
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
  }
  .btn:active{background:#3D78C9;}
  .btn.secondary{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
  }

  .entry{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:13px 14px;
    margin-bottom:10px;
    box-shadow:0 1px 3px rgba(43,58,74,0.04);
  }
  .entry .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .entry .scene-tag{
    font-size:11px;
    padding:2px 9px;
    border-radius:999px;
    background:var(--surface-2);
    color:var(--accent);
    font-family:'JetBrains Mono',monospace;
  }
  .entry .ts{font-size:11.5px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
  .entry .text{font-size:14px;line-height:1.5;}
  .entry .energy-bit{font-size:11.5px;color:var(--text-muted);margin-top:6px;font-family:'JetBrains Mono',monospace;}

  .stat-row{display:flex;gap:10px;margin-bottom:14px;}
  .stat-card{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:0 1px 3px rgba(43,58,74,0.04);
  }
  .stat-card .num{font-family:'Quicksand',sans-serif;font-size:23px;font-weight:700;color:var(--accent);}
  .stat-card .lbl{font-size:11.5px;color:var(--text-muted);margin-top:2px;}

  .scene-bar-row{margin-bottom:10px;}
  .scene-bar-row .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
  .scene-bar-row .top span.pct{color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:12px;}
  .bar-track{height:7px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent);border-radius:4px;}

  .goal-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
    box-shadow:0 1px 3px rgba(43,58,74,0.04);
  }
  .goal-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .goal-card .name{font-weight:600;font-size:14.5px;}
  .goal-card .pin{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
  .goal-card .bar-track{margin-top:8px;}
  .goal-card .progress-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);float:right;margin-top:6px;}
  .goal-card input[type=range]{margin-top:4px;}
  .goal-card .del{font-size:12px;color:var(--text-muted);cursor:pointer;margin-top:8px;display:inline-block;}

  .quote-row{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:11px 13px;
    margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .quote-row .qtext{font-size:13.5px;line-height:1.5;}
  .quote-row .del{font-size:12px;color:var(--text-muted);cursor:pointer;flex-shrink:0;}

  .empty{
    text-align:center;
    color:var(--text-muted);
    font-size:13.5px;
    padding:30px 10px;
  }

  .field-row{display:flex;gap:8px;margin-top:10px;}
  .field-row input[type=text]{
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:11px 12px;
  }
  .field-row input:focus{outline:none;border-color:var(--accent);}

  /* ---------- 底部标签栏 ---------- */
  nav.tabbar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;
    background:var(--surface);
    border-top:1px solid var(--border);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:20;
  }
  nav.tabbar button{
    flex:1;
    background:none;border:none;
    color:var(--text-muted);
    font-family:'Inter',sans-serif;
    font-size:12px;
    padding:8px 0 4px;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;
  }
  nav.tabbar button .dot{width:6px;height:6px;border-radius:50%;background:transparent;}
  nav.tabbar button.active{color:var(--accent);}
  nav.tabbar button.active .dot{background:var(--accent);}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-aura"></div>
  <div id="splashQuote">愿你今天，与自己温柔相处。</div>
  <div id="splashHint">轻触屏幕继续</div>
</div>

<div class="statusbar">
  <div class="aura-dot" id="auraDot"></div>
  <div>
    <div class="label">当前精力</div>
    <div class="value mono" id="energyValue">--</div>
  </div>
  <div class="time mono" id="clock"></div>
</div>

<div class="banner ios" id="iosBanner">
  <span class="close" id="iosBannerClose">×</span>
  在 iPhone 上:点击底部 <strong>分享</strong> 按钮 → 选择 <strong>添加到主屏幕</strong>,才能像 App 一样打开,并在未来支持提醒。
</div>

<div class="banner reminder" id="reminderBanner">
  <span class="close" id="reminderBannerClose">×</span>
  <span id="reminderText"></span>
</div>

<div class="banner hook" id="hookBanner">
  <span class="close" id="hookBannerClose">×</span>
  <div id="hookText"></div>
</div>

<main>

  <!-- 记录 -->
  <section class="view active" id="view-log">
    <h2 class="section-title">记录此刻</h2>
    <textarea id="entryText" placeholder="刚刚在做什么、在哪、状态如何……"></textarea>

    <div class="scene-row" id="sceneRow"></div>

    <div class="energy-row">
      <div class="row-label"><span>精力等级</span><span class="val mono" id="energySliderVal">6</span></div>
      <input type="range" id="energySlider" min="1" max="10" value="6">
    </div>

    <button class="btn" id="saveEntryBtn">保存记录</button>

    <h2 class="section-title">最近记录</h2>
    <div id="recentEntries"></div>
  </section>

  <!-- 光谱 -->
  <section class="view" id="view-spectrum">
    <h2 class="section-title">精力光谱</h2>
    <div class="stat-row">
      <div class="stat-card"><div class="num mono" id="statCount">0</div><div class="lbl">已记录次数</div></div>
      <div class="stat-card"><div class="num mono" id="statAvgEnergy">--</div><div class="lbl">平均精力</div></div>
    </div>

    <h2 class="section-title">场景分布</h2>
    <div id="sceneBars"></div>

    <h2 class="section-title">标签规则(可编辑)</h2>
    <div id="ruleEditor"></div>
    <div class="field-row">
      <input type="text" id="newKeyword" placeholder="关键词,例如:开会">
      <input type="text" id="newScene" placeholder="归类到的场景">
    </div>
    <button class="btn secondary" id="addRuleBtn">添加规则</button>

    <h2 class="section-title">开屏寄语库(可编辑)</h2>
    <div id="quoteEditor"></div>
    <div class="field-row">
      <input type="text" id="newQuote" placeholder="写一句你想看到的话">
    </div>
    <button class="btn secondary" id="addQuoteBtn">添加到寄语库</button>
  </section>

  <!-- 主线 -->
  <section class="view" id="view-goals">
    <h2 class="section-title">长期主线</h2>
    <div id="goalsList"></div>

    <div class="field-row">
      <input type="text" id="newGoalName" placeholder="新目标名称">
    </div>
    <button class="btn secondary" id="addGoalBtn">添加目标</button>
  </section>

</main>

<nav class="tabbar">
  <button class="tab-btn active" data-view="log"><span class="dot"></span>记录</button>
  <button class="tab-btn" data-view="spectrum"><span class="dot"></span>光谱</button>
  <button class="tab-btn" data-view="goals"><span class="dot"></span>主线</button>
</nav>

<script>
/* ---------- 基础工具 ---------- */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function load(key, fallback){
  try{
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtTime(ts){
  const d = new Date(ts);
  return d.getMonth()+1+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

/* ---------- 默认数据 ---------- */
const DEFAULT_SCENES = ["工作","通勤","独处","社交"];

const DEFAULT_RULES = [
  {keyword:"开会", scene:"工作"}, {keyword:"写代码", scene:"工作"}, {keyword:"任务", scene:"工作"},
  {keyword:"加班", scene:"工作"}, {keyword:"汇报", scene:"工作"},
  {keyword:"地铁", scene:"通勤"}, {keyword:"公交", scene:"通勤"}, {keyword:"开车", scene:"通勤"}, {keyword:"路上", scene:"通勤"},
  {keyword:"发呆", scene:"独处"}, {keyword:"独自", scene:"独处"}, {keyword:"一个人", scene:"独处"}, {keyword:"睡觉", scene:"独处"},
  {keyword:"朋友", scene:"社交"}, {keyword:"聚餐", scene:"社交"}, {keyword:"聊天", scene:"社交"}, {keyword:"见面", scene:"社交"}
];

const DEFAULT_QUOTES = [
  "愿你今天，与自己温柔相处。",
  "慢一点也没关系，你已经在往前走了。",
  "休息不是放弃，是给自己充电的方式。",
  "不必时刻都有答案，先安顿好自己就好。",
  "你做的已经够多了，今天可以对自己宽容一点。"
];

const HOOK_RULES = [
  {
    id:"physio",
    keywords:["感冒","头痛","憋闷","不舒服","失眠","发烧","咳嗽","难受"],
    title:"⚡ 命中钩子:生理预警",
    body:"先暂停手头的事。建议:喝点温水、让房间通风、把光线调暗、躺下休息15分钟。如果持续加重,去看医生,这不是能硬扛的事。"
  },
  {
    id:"minimal",
    keywords:["琐事","太多事","心很乱","事情太多","忙不过来","千头万绪"],
    title:"⚡ 命中钩子:极简防御",
    body:"停。现在只回答一个问题:今天真正重要的事,最多三件,是什么?剩下的全部放下,今天不处理。"
  }
];

/* ---------- 状态 ---------- */
let entries = load("osw_entries", []);
let goals = load("osw_goals", []);
let rules = load("osw_rules", DEFAULT_RULES);
let quotes = load("osw_quotes", DEFAULT_QUOTES);
let selectedScene = null;

/* ---------- 开屏寄语 ---------- */
function showSplash(){
  const pool = quotes.length ? quotes : DEFAULT_QUOTES;
  const pick = pool[Math.floor(Math.random() * pool.length)];
  $("#splashQuote").textContent = pick;
  const splash = $("#splash");
  function dismiss(){
    splash.classList.add("hide");
    splash.removeEventListener("click", dismiss);
  }
  splash.addEventListener("click", dismiss);
  setTimeout(dismiss, 2600);
}

/* ---------- 状态栏:能量光晕 ---------- */
function renderAura(){
  const last = entries[entries.length-1];
  const e = last ? last.energy : null;
  $("#energyValue").textContent = e ? e + " / 10" : "暂无数据";
  const dot = $("#auraDot");
  if(e){
    const t = (e-1)/9; // 0..1
    dot.style.boxShadow = `0 0 ${10+t*16}px ${2+t*5}px rgba(79,143,224,${0.15+t*0.25})`;
  }
}
function tickClock(){
  const d = new Date();
  $("#clock").textContent = String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
setInterval(tickClock, 1000*15);
tickClock();

/* ---------- 场景选择 ---------- */
function renderSceneRow(){
  const allScenes = Array.from(new Set([...DEFAULT_SCENES, ...rules.map(r=>r.scene)]));
  $("#sceneRow").innerHTML = allScenes.map(s =>
    `<div class="scene-chip ${s===selectedScene?'active':''}" data-scene="${s}">${s}</div>`
  ).join("");
  $$(".scene-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      selectedScene = chip.dataset.scene;
      renderSceneRow();
    });
  });
}

function guessScene(text){
  for(const r of rules){
    if(text.includes(r.keyword)) return r.scene;
  }
  return null;
}

function checkHooks(text){
  return HOOK_RULES.filter(h => h.keywords.some(k => text.includes(k)));
}

/* ---------- 保存记录 ---------- */
$("#energySlider").addEventListener("input", e=>{
  $("#energySliderVal").textContent = e.target.value;
});

$("#saveEntryBtn").addEventListener("click", ()=>{
  const text = $("#entryText").value.trim();
  if(!text){ return; }
  const scene = selectedScene || guessScene(text) || "未分类";
  const energy = parseInt($("#energySlider").value, 10);

  const entry = { id:uid(), ts:Date.now(), text, scene, energy };
  entries.push(entry);
  save("osw_entries", entries);

  const hooks = checkHooks(text);
  if(hooks.length){
    $("#hookText").innerHTML = hooks.map(h=>`<strong>${h.title}</strong><br>${h.body}`).join("<br><br>");
    $("#hookBanner").classList.add("show");
  }

  $("#entryText").value = "";
  selectedScene = null;
  renderSceneRow();
  renderAll();
});

/* ---------- 最近记录 ---------- */
function renderRecent(){
  const list = entries.slice(-8).reverse();
  if(!list.length){
    $("#recentEntries").innerHTML = `<div class="empty">还没有记录,从上面写下第一条开始。</div>`;
    return;
  }
  $("#recentEntries").innerHTML = list.map(e => `
    <div class="entry">
      <div class="meta">
        <span class="scene-tag">${e.scene}</span>
        <span class="ts">${fmtTime(e.ts)}</span>
      </div>
      <div class="text">${e.text.replace(/</g,"&lt;")}</div>
      <div class="energy-bit">精力 ${e.energy}/10</div>
    </div>
  `).join("");
}

/* ---------- 光谱统计 ---------- */
function renderSpectrum(){
  $("#statCount").textContent = entries.length;
  $("#statAvgEnergy").textContent = entries.length
    ? (entries.reduce((s,e)=>s+e.energy,0)/entries.length).toFixed(1)
    : "--";

  const counts = {};
  entries.forEach(e => counts[e.scene] = (counts[e.scene]||0) + 1);
  const total = entries.length || 1;
  const scenes = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);

  if(!scenes.length){
    $("#sceneBars").innerHTML = `<div class="empty">暂无数据。</div>`;
  } else {
    $("#sceneBars").innerHTML = scenes.map(s => {
      const pct = Math.round(counts[s]/total*100);
      return `
        <div class="scene-bar-row">
          <div class="top"><span>${s}</span><span class="pct">${counts[s]} 次 · ${pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    }).join("");
  }

  $("#ruleEditor").innerHTML = rules.map((r,i) => `
    <div class="entry" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;">
      <span style="font-size:13.5px;"><span class="mono" style="color:var(--accent);">${r.keyword}</span> → ${r.scene}</span>
      <span class="del" data-idx="${i}" style="cursor:pointer;color:var(--text-muted);">删除</span>
    </div>
  `).join("");
  $$("#ruleEditor .del").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      rules.splice(parseInt(btn.dataset.idx,10),1);
      save("osw_rules", rules);
      renderSpectrum();
      renderSceneRow();
    });
  });

  renderQuoteEditor();
}

$("#addRuleBtn").addEventListener("click", ()=>{
  const kw = $("#newKeyword").value.trim();
  const sc = $("#newScene").value.trim();
  if(!kw || !sc) return;
  rules.push({keyword:kw, scene:sc});
  save("osw_rules", rules);
  $("#newKeyword").value=""; $("#newScene").value="";
  renderSpectrum();
  renderSceneRow();
});

/* ---------- 开屏寄语库管理 ---------- */
function renderQuoteEditor(){
  if(!quotes.length){
    $("#quoteEditor").innerHTML = `<div class="empty">寄语库是空的,添加第一句吧。</div>`;
    return;
  }
  $("#quoteEditor").innerHTML = quotes.map((q,i) => `
    <div class="quote-row">
      <span class="qtext">${q.replace(/</g,"&lt;")}</span>
      <span class="del" data-idx="${i}">删除</span>
    </div>
  `).join("");
  $$("#quoteEditor .del").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      quotes.splice(parseInt(btn.dataset.idx,10),1);
      save("osw_quotes", quotes);
      renderQuoteEditor();
    });
  });
}

$("#addQuoteBtn").addEventListener("click", ()=>{
  const q = $("#newQuote").value.trim();
  if(!q) return;
  quotes.push(q);
  save("osw_quotes", quotes);
  $("#newQuote").value = "";
  renderQuoteEditor();
});

/* ---------- 主线目标 ---------- */
function renderGoals(){
  if(!goals.length){
    $("#goalsList").innerHTML = `<div class="empty">还没有设定主线目标。</div>`;
    return;
  }
  $("#goalsList").innerHTML = goals.map(g => `
    <div class="goal-card" data-id="${g.id}">
      <div class="top">
        <span class="name">${g.name}</span>
        <span class="pin">${g.progress}%</span>
      </div>
      <input type="range" min="0" max="100" value="${g.progress}" class="goal-slider" data-id="${g.id}">
      <span class="del" data-id="${g.id}">删除目标</span>
    </div>
  `).join("");

  $$(".goal-slider").forEach(s=>{
    s.addEventListener("input", ()=>{
      const g = goals.find(x=>x.id===s.dataset.id);
      g.progress = parseInt(s.value,10);
      save("osw_goals", goals);
      s.closest(".goal-card").querySelector(".pin").textContent = g.progress+"%";
    });
  });
  $$(".goal-card .del").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      goals = goals.filter(g=>g.id!==btn.dataset.id);
      save("osw_goals", goals);
      renderGoals();
    });
  });
}

$("#addGoalBtn").addEventListener("click", ()=>{
  const name = $("#newGoalName").value.trim();
  if(!name) return;
  goals.push({id:uid(), name, progress:0});
  save("osw_goals", goals);
  $("#newGoalName").value="";
  renderGoals();
});

/* ---------- 横幅 ---------- */
$("#hookBannerClose").addEventListener("click", ()=> $("#hookBanner").classList.remove("show"));
$("#reminderBannerClose").addEventListener("click", ()=> $("#reminderBanner").classList.remove("show"));
$("#iosBannerClose").addEventListener("click", ()=>{
  $("#iosBanner").classList.remove("show");
  localStorage.setItem("osw_ios_dismissed","1");
});

function checkIOSBanner(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if(isIOS && !isStandalone && !localStorage.getItem("osw_ios_dismissed")){
    $("#iosBanner").classList.add("show");
  }
}

function checkReminder(){
  if(!entries.length) return;
  const last = entries[entries.length-1];
  const hoursSince = (Date.now()-last.ts)/3600000;
  if(hoursSince >= 3){
    $("#reminderText").innerHTML = `已经 <strong>${hoursSince.toFixed(1)} 小时</strong>没有记录了。回想一下,这段时间花在哪了?要不要回归主线看看?`;
    $("#reminderBanner").classList.add("show");
  }
}

/* ---------- 标签页切换 ---------- */
$$(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    $$(".tab-btn").forEach(b=>b.classList.remove("active"));
    $$(".view").forEach(v=>v.classList.remove("active"));
    btn.classList.add("active");
    $("#view-"+btn.dataset.view).classList.add("active");
  });
});

/* ---------- 汇总渲染 ---------- */
function renderAll(){
  renderAura();
  renderRecent();
  renderSpectrum();
  renderGoals();
}
showSplash();
renderSceneRow();
renderAll();
checkIOSBanner();
checkReminder();

/* ---------- Service Worker 注册 ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
